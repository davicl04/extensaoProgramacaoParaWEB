<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM: Conceitos básicos</title>
</head>
<body>
    <h1>DOM: Página Interativa com JavaScript</h1>

    <div>
        <button id="btnIncrementar">Incrementar</button>
        <button id="btnDecrementar">Decrementar</button>
        <br><br>
        <span id="valorContador">0</span>
    </div>

    <br><br> <div>
        <input type="text" id="mensagemInput" placeholder="Digite algo...">
        <br>
        <span id="contador">0</span> caracteres
    </div>

    <br><br> <div id="containerTexto"></div>

    <br><br> <div>
        Escolha o tipo de lista:
        <select id="tipoLista">
            <option value="ul">Lista Não Ordenada</option>
            <option value="ol">Lista Ordenada</option>
        </select>
        <button id="btnAdicionarLista">Adicionar Lista</button>
    </div>

    <br><br> <div id="containerListas"></div>

    <br><br>

    <div>
        <button id="btnReset">Resetar Tudo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
